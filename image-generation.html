<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Economics DOS — Daily Post Tool</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#050505;
  --panel:rgba(255,255,255,0.03);
  --border:rgba(255,255,255,0.1);
  --green:#00ff66;
  --green-dim:rgba(0,255,102,0.12);
  --text:#fff;
  --muted:#71717a;
  --caption-bg:rgba(0,0,0,0.45);
}
body{
  background:var(--bg);
  color:var(--text);
  font-family:'Inter',sans-serif;
  min-height:100vh;
  -webkit-font-smoothing:antialiased;
}

/* ── TOP BAR ── */
.topbar{
  border-bottom:1px solid var(--border);
  padding:0 32px;
  height:64px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  background:rgba(0,0,0,0.6);
  backdrop-filter:blur(20px);
  position:sticky;
  top:0;
  z-index:100;
}
.topbar-brand{
  display:flex;
  align-items:center;
  gap:12px;
  font-family:'Space Mono',monospace;
}
.topbar-dot{
  width:8px;height:8px;
  background:var(--green);
  border-radius:50%;
  box-shadow:0 0 10px var(--green);
  animation:pulse 2s ease-in-out infinite;
}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:0.7;transform:scale(1.2)}}
.topbar-title{font-size:13px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase}
.topbar-sub{font-size:11px;color:var(--muted);letter-spacing:0.5px}

/* ── LAYOUT ── */
.app{
  display:grid;
  grid-template-columns:240px 1fr;
  min-height:calc(100vh - 64px);
}

/* ── SIDEBAR ── */
.sidebar{
  border-right:1px solid var(--border);
  padding:28px 16px;
  display:flex;
  flex-direction:column;
  gap:6px;
}
.sidebar-label{
  font-family:'Space Mono',monospace;
  font-size:10px;
  color:var(--muted);
  text-transform:uppercase;
  letter-spacing:1.5px;
  padding:0 8px;
  margin-bottom:8px;
}
.day-btn{
  width:100%;
  padding:12px 16px;
  border:1px solid transparent;
  background:transparent;
  color:var(--muted);
  border-radius:10px;
  cursor:pointer;
  text-align:left;
  transition:all 0.2s;
  display:flex;
  align-items:center;
  gap:12px;
  font-family:'Inter',sans-serif;
}
.day-btn:hover{
  background:rgba(255,255,255,0.05);
  color:var(--text);
  border-color:var(--border);
}
.day-btn.active{
  background:var(--green-dim);
  border-color:rgba(0,255,102,0.35);
  color:var(--text);
}
.day-btn.active .day-num{color:var(--green)}
.day-num{
  font-family:'Space Mono',monospace;
  font-size:13px;
  font-weight:700;
  color:var(--muted);
  min-width:20px;
}
.day-info{display:flex;flex-direction:column;gap:2px}
.day-name{font-size:13px;font-weight:500}
.day-sub{font-size:11px;color:var(--muted)}

/* ── MAIN CONTENT ── */
.main{
  padding:40px 48px;
  display:flex;
  flex-direction:column;
  gap:32px;
  max-width:900px;
}

.day-header{
  display:flex;
  flex-direction:column;
  gap:6px;
}
.day-header-eyebrow{
  font-family:'Space Mono',monospace;
  font-size:11px;
  color:var(--green);
  text-transform:uppercase;
  letter-spacing:2px;
}
.day-header-title{
  font-size:28px;
  font-weight:700;
  letter-spacing:-0.5px;
}

/* ── TIME TOGGLE ── */
.time-toggle{
  display:inline-flex;
  background:rgba(255,255,255,0.06);
  border:1px solid var(--border);
  border-radius:10px;
  padding:4px;
  gap:4px;
  width:fit-content;
}
.time-btn{
  padding:10px 24px;
  border:none;
  border-radius:7px;
  background:transparent;
  color:var(--muted);
  font-family:'Inter',sans-serif;
  font-size:13px;
  font-weight:600;
  cursor:pointer;
  transition:all 0.2s;
  display:flex;
  align-items:center;
  gap:8px;
}
.time-btn.active{
  background:#ffffff;
  color:#000000;
}
.time-btn:not(.active):hover{
  color:var(--text);
  background:rgba(255,255,255,0.08);
}

/* ── CONTENT AREA ── */
.post-area{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:28px;
  align-items:start;
}

.image-frame{
  border-radius:14px;
  overflow:hidden;
  border:1px solid var(--border);
  position:relative;
  background:#0a0a0a;
  aspect-ratio:952/1260;
}
.image-frame img{
  width:100%;
  height:100%;
  object-fit:cover;
  display:block;
}
.image-badge{
  position:absolute;
  top:12px;
  left:12px;
  background:rgba(0,0,0,0.75);
  backdrop-filter:blur(8px);
  border:1px solid var(--border);
  border-radius:6px;
  padding:5px 10px;
  font-family:'Space Mono',monospace;
  font-size:10px;
  color:var(--text);
  letter-spacing:0.5px;
  text-transform:uppercase;
}

.caption-panel{
  display:flex;
  flex-direction:column;
  gap:16px;
}
.caption-label{
  font-family:'Space Mono',monospace;
  font-size:10px;
  color:var(--muted);
  text-transform:uppercase;
  letter-spacing:1.5px;
}
.caption-box{
  background:var(--caption-bg);
  border:1px solid var(--border);
  border-radius:12px;
  padding:20px;
  font-size:13.5px;
  line-height:1.75;
  color:#e4e4e7;
  white-space:pre-wrap;
  word-break:break-word;
  min-height:280px;
  max-height:420px;
  overflow-y:auto;
}
.caption-box::-webkit-scrollbar{width:4px}
.caption-box::-webkit-scrollbar-track{background:transparent}
.caption-box::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}

/* ── ACTIONS ── */
.actions{
  display:flex;
  flex-direction:column;
  gap:10px;
  margin-top:4px;
}
.btn-wa{
  width:100%;
  padding:14px 20px;
  border:none;
  background:#25D366;
  color:#ffffff;
  border-radius:10px;
  font-family:'Inter',sans-serif;
  font-size:13px;
  font-weight:700;
  cursor:pointer;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:10px;
  transition:all 0.2s;
  letter-spacing:0.3px;
}
.btn-wa:hover{filter:brightness(1.1);transform:translateY(-1px)}
.btn-wa:active{transform:translateY(0)}
.btn-wa:disabled{opacity:0.5;cursor:not-allowed;transform:none}

.btn-row{display:flex;gap:10px}
.btn-secondary{
  flex:1;
  padding:12px 16px;
  background:rgba(255,255,255,0.06);
  border:1px solid var(--border);
  color:var(--text);
  border-radius:10px;
  font-family:'Inter',sans-serif;
  font-size:12px;
  font-weight:600;
  cursor:pointer;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:8px;
  transition:all 0.2s;
  letter-spacing:0.2px;
}
.btn-secondary:hover{background:rgba(255,255,255,0.12);border-color:rgba(255,255,255,0.2)}
.btn-secondary.copied{background:var(--green-dim);border-color:rgba(0,255,102,0.35);color:var(--green)}

.status-msg{
  font-size:12px;
  color:var(--green);
  text-align:center;
  min-height:18px;
  font-family:'Space Mono',monospace;
  letter-spacing:0.5px;
  opacity:0;
  transition:opacity 0.3s;
}
.status-msg.show{opacity:1}

/* ── MOBILE ── */
@media(max-width:768px){
  .app{grid-template-columns:1fr;}
  .sidebar{
    flex-direction:row;
    overflow-x:auto;
    padding:12px;
    gap:8px;
    border-right:none;
    border-bottom:1px solid var(--border);
  }
  .sidebar-label{display:none}
  .day-btn{
    min-width:80px;
    flex-direction:column;
    align-items:center;
    padding:10px 12px;
    gap:4px;
  }
  .day-info .day-sub{display:none}
  .main{padding:24px 20px;gap:24px;}
  .post-area{grid-template-columns:1fr;}
  .image-frame{max-width:320px;margin:0 auto;}
}
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-brand">
    <div class="topbar-dot"></div>
    <div>
      <div class="topbar-title">DOS Post Tool</div>
      <div class="topbar-sub">Economics Yearbook · 2025/2026</div>
    </div>
  </div>
  <div style="font-family:'Space Mono',monospace;font-size:11px;color:var(--muted)">7-Day Window</div>
</div>

<div class="app">

      <div class="day-info">
        <span class="day-name">Day 1</span>
        <span class="day-sub">Launch Day</span>
      </div>

    <button class="day-btn" onclick="selectDay(2)" id="daybtn-2">
      <span class="day-num">02</span>
      <div class="day-info">

        <span class="day-sub">Building Momentum</span>
      </div>
    </button>
    <button class="day-btn" onclick="selectDay(3)" id="daybtn-3">
      <span class="day-num">03</span>
      <div class="day-info">
        <span class="day-name">Day 3</span>
        <span class="day-sub">Halfway Point</span>
      </div>
    </button>
    <button class="day-btn" onclick="selectDay(4)" id="daybtn-4">
      <span class="day-num">04</span>
      <div class="day-info">
        <span class="day-name">Day 4</span>
        <span class="day-sub">Past the Midpoint</span>

    <button class="day-btn" onclick="selectDay(5)" id="daybtn-5">

    <button class="day-btn" onclick="selectDay(6)" id="daybtn-6">

        <span class="day-name">Day 6</span>

    <button class="day-btn" onclick="selectDay(7)" id="daybtn-7">

      <div class="day-info">
        <span class="day-name">Day 7</span>
        <span class="day-sub">Final Day</span>
      </div>
    </button>
  </div>

  <div class="main">
    <div>
      <div class="day-header">
        <div class="day-header-eyebrow" id="eyebrow">Day 1 of 7</div>
        <div class="day-header-title" id="day-title">Launch Day</div>
      </div>
    </div>

    <div class="time-toggle">
      <button class="time-btn active" onclick="selectTime('morning')" id="btn-morning">
        ☀️ Morning Post
      </button>
      <button class="time-btn" onclick="selectTime('evening')" id="btn-evening">
        🌙 Evening Post
      </button>
    </div>

    <div class="post-area">
      <div>
        <div class="image-frame">
          <img id="post-image" src="" alt="Day post image">
          <div class="image-badge" id="img-badge">Day 1 · Morning</div>
        </div>
      </div>

      <div class="caption-panel">
        <div class="caption-label">Caption — copy &amp; paste into WhatsApp</div>
        <div class="caption-box" id="caption-box"></div>

            Share Image to WhatsApp
          </button>
          <div class="btn-row">
            <button class="btn-secondary" onclick="copyCaption()" id="copy-btn">
              📋 Copy Caption
            </button>
            <button class="btn-secondary" onclick="downloadImage()" id="dl-btn">
              ⬇️ Download Image
            </button>
          </div>
          <div class="status-msg" id="status-msg"></div>
        </div>
      </div>
    </div>
  </div>
</div>

let currentDay = 1;
let currentTime = 'morning';

function selectDay(day) {
  document.querySelectorAll('.day-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('daybtn-' + day).classList.add('active');
  currentDay = day;
  render();
}

function selectTime(time) {
  document.getElementById('btn-morning').classList.toggle('active', time === 'morning');
  document.getElementById('btn-evening').classList.toggle('active', time === 'evening');
  currentTime = time;
  render();
}

function render() {
  const d = DAYS[currentDay];
  const t = currentTime;

  document.getElementById('eyebrow').textContent = 'Day ' + currentDay + ' of 7';
  document.getElementById('day-title').textContent = d.label;
  document.getElementById('post-image').src = IMAGES[currentDay];
  document.getElementById('img-badge').textContent = 'Day ' + currentDay + ' · ' + (t === 'morning' ? 'Morning' : 'Evening');
  document.getElementById('caption-box').textContent = d[t];

  // Reset status
  const sm = document.getElementById('status-msg');
  sm.textContent = '';
  sm.classList.remove('show');
  document.getElementById('copy-btn').classList.remove('copied');
}

function showStatus(msg, isError) {
  const sm = document.getElementById('status-msg');
  sm.textContent = msg;
  sm.style.color = isError ? '#ff4444' : 'var(--green)';
  sm.classList.add('show');
  setTimeout(() => sm.classList.remove('show'), 3000);
}

async function shareToWhatsApp() {
  const btn = document.getElementById('wa-btn');
  const origText = btn.innerHTML;
  btn.disabled = true;
  btn.innerHTML = '<span style="opacity:0.7">Preparing image...</span>';

  try {
    const b64 = IMAGES[currentDay].split(',')[1];
    const bytes = atob(b64);
    const arr = new Uint8Array(bytes.length);
    for (let i = 0; i < bytes.length; i++) arr[i] = bytes.charCodeAt(i);
    // Use image/jpeg so WhatsApp renders it as an image, not a file attachment
    const blob = new Blob([arr], { type: 'image/jpeg' });
    const file = new File([blob], 'Economics_Day' + currentDay + '.jpg', { type: 'image/jpeg' });

    const caption = DAYS[currentDay][currentTime];

    if (navigator.canShare && navigator.canShare({ files: [file] })) {
      await navigator.share({
        files: [file],
        text: caption,
        title: 'Economics Yearbook - Day ' + currentDay
      });
      showStatus('Shared successfully ✓');
    } else {
      // Desktop fallback — download image + copy caption
      downloadImage();
      await copyCaption();
      showStatus('Image downloaded · Caption copied — paste both into WhatsApp');
    }
  } catch(e) {
    if (e.name !== 'AbortError') {
      downloadImage();
      showStatus('Share cancelled — image downloaded instead');
    }
  } finally {
    btn.disabled = false;
    btn.innerHTML = origText;
  }
}

async function copyCaption() {
  const text = DAYS[currentDay][currentTime];
  try {
    await navigator.clipboard.writeText(text);
    const btn = document.getElementById('copy-btn');
    btn.classList.add('copied');
    btn.textContent = '✓ Copied!';
    setTimeout(() => {
      btn.classList.remove('copied');
      btn.innerHTML = '📋 Copy Caption';
    }, 2500);
    showStatus('Caption copied to clipboard ✓');
  } catch(e) {
    // Fallback
    const el = document.createElement('textarea');
    el.value = text;
    el.style.position = 'fixed';
    el.style.opacity = '0';
    document.body.appendChild(el);
    el.select();
    document.execCommand('copy');
    document.body.removeChild(el);
    showStatus('Caption copied ✓');
  }
}

function downloadImage() {
  const b64 = IMAGES[currentDay];
  const a = document.createElement('a');
  a.href = b64;
  a.download = 'Economics_Day' + currentDay + '_' + currentTime + '.jpg';
  a.click();
  showStatus('Image downloaded ✓');
}

// Init
render();
</script>
